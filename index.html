    <link

    <!-- Preconnect for assets -->
    <link
      rel="preconnect"

    />
    <link
      rel="preload"
      as="image"
      href="/hero/download.webp"
      fetchpriority="high"
    />

    <!-- Critical CSS for Preloader & Theme -->
    <style>
      :root {
        --bg-dark: #0b0d13;
        --text-white: #ffffff;
        --accent-purple: #8b5cf6;
      }
      body {
        background-color: var(--bg-dark);
        color: var(--text-white);
        margin: 0;
        font-family: "Inter", sans-serif;
      }
      /* Initial Loader Styles */
      .loader-wrapper {
        position: fixed;
        inset: 0;
        background: #0b0d13;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        overflow: hidden;
      }
      .loader-content {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 400px;
        padding: 2rem;
        text-align: center;
      }
      .logo-spark {
        width: 40px;
        height: 40px;
        background: linear-gradient(135deg, #8b5cf6, #d946ef);
        border-radius: 12px;
        transform: rotate(45deg);
        margin: 0 auto 3rem;
        animation: sparkPulse 2s infinite ease-in-out;
      }
      @keyframes sparkPulse {
        0%,
        100% {
          transform: rotate(45deg) scale(1);
          opacity: 0.8;
        }
        50% {
          transform: rotate(45deg) scale(1.1);
          opacity: 1;
          filter: blur(2px);
        }
      }
      .progress-bar-bg {
        width: 100%;
        height: 4px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 999px;
        overflow: hidden;
      }
      .progress-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, #8b5cf6, #d946ef);
        box-shadow: 0 0 15px rgba(139, 92, 246, 0.5);
        border-radius: 999px;
      }
      .app-content-fade-in {
        animation: appEntrance 0.8s ease-out forwards;
      }
      @keyframes appEntrance {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>

    <!-- Optimized Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"

    <link

    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet"
      />
    </noscript>
